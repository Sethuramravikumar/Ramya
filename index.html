<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorry Ramya! 🥺</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            box-sizing: border-box;
        }

        h1 {
            color: #d63031;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p {
            color: #636e72;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 40px; /* Thoorama vachirukom */
            width: 100%;
            margin-top: 20px;
        }

        button {
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            outline: none;
        }

        #yesBtn {
            background-color: #2ed573;
            color: white;
        }

        #noBtn {
            background-color: #ff4757;
            color: white;
        }

        /* Animation effects */
        .heart {
            position: absolute;
            color: #ff4757;
            font-size: 24px;
            animation: floatUp 3s linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainBox">
        <h1 id="title">Ramya... Kutty Ma! 🥺</h1>
        <p id="message">En mela innum romba kobama irukiya? I am really very sorry deep from my heart. Enna manichudriya Ramya?</p>
        
        <div class="btn-container">
            <button id="yesBtn" onclick="forgiven()">Yes, Manichuten! ❤️</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No 😡</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            
            // Layout crash aagama iruka, click panra second-la mattum absolute fix panrom
            noBtn.style.position = 'fixed';
            
            // Full screen viewport kulla enga vena random-ah odum
            const x = Math.random() * (window.innerWidth - 120);
            const y = Math.random() * (window.innerHeight - 50);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function forgiven() {
            const title = document.getElementById('title');
            const message = document.getElementById('message');
            const btnContainer = document.querySelector('.btn-container');

            title.innerText = "Thank You Ramya! 😍";
            message.innerText = "Nee kobama irundha enaku rathiri thookame varala తెரியாமா? You are my everything! En rathasame, I Love You! 😘❤️";
            
            // Buttons full-ah maranjidum, layout clean aagidum
            btnContainer.style.display = 'none'; 

            // Hearts parakka vidrom
            setInterval(createHeart, 300);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 2s + 's';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 3000);
        }
    </script>
</body>
</html>
